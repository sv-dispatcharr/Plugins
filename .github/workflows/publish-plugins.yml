name: Publish Plugins

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches:
      - main
    paths:
      - 'plugins/**'
      - '.github/workflows/publish-plugins.yml'
      - '.github/scripts/publish/run.sh'
      - '.github/scripts/publish/build-zips.sh'
      - '.github/scripts/publish/plugin-readmes.sh'
      - '.github/scripts/publish/cleanup.sh'
      - '.github/scripts/publish/generate-manifest.sh'
      - '.github/scripts/publish/releases-readme.sh'
      - '.github/scripts/keys/**'
  workflow_dispatch:
    inputs:
      force_rebuild:
        description: 'Wipe and recreate the releases branch from scratch. WARNING: purges all version history - only the latest version of each plugin will be retained.'
        type: boolean
        default: false
        required: false
      force_rebuild_confirm:
        description: 'Type CONFIRM to proceed with force rebuild (required when force_rebuild is true)'
        type: string
        default: ''
        required: false

concurrency:
  group: publish-plugins
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Load app ID from config
        id: config
        env:
          GH_APP_ID: ${{ vars.GH_APP_ID }}
          GH_APP_PRIVATE_KEY: ${{ secrets.GH_APP_PRIVATE_KEY }}
        run: |
          if [[ -n "${GH_APP_ID:-}" && -n "${GH_APP_PRIVATE_KEY:-}" ]]; then
            echo "app_id=${GH_APP_ID}" >> "$GITHUB_OUTPUT"
            echo "use_app=true" >> "$GITHUB_OUTPUT"
          else
            echo "use_app=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate GitHub App token
        if: steps.config.outputs.use_app == 'true'
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ steps.config.outputs.app_id }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}

      - name: Log fallback to actions token
        if: steps.config.outputs.use_app != 'true'
        run: |
          printf '## ⚠️ GitHub App token not available\n\nGH_APP_ID or GH_APP_PRIVATE_KEY not configured. Falling back to `GITHUB_TOKEN` (github-actions[bot] identity).\n' >> "$GITHUB_STEP_SUMMARY"

      - name: Make scripts executable
        run: chmod +x .github/scripts/publish/*.sh

      - name: Publish plugins to releases branch
        id: publish
        env:
          GITHUB_TOKEN: ${{ steps.config.outputs.use_app == 'true' && steps.app-token.outputs.token || github.token }}
          APP_SLUG: ${{ steps.app-token.outputs.app-slug }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
          FORCE_REBUILD: ${{ inputs.force_rebuild }}
          FORCE_REBUILD_CONFIRM: ${{ inputs.force_rebuild_confirm }}
        run: |
          set -o pipefail
          if [[ "${FORCE_REBUILD}" == "true" && "${FORCE_REBUILD_CONFIRM}" != "CONFIRM" ]]; then
            echo "::error::force_rebuild requires typing CONFIRM in the force_rebuild_confirm input."
            exit 1
          fi
          .github/scripts/publish/run.sh ${{ github.ref_name }} 2>&1 | tee publish.log

      - name: Generate job summary
        if: always()
        run: |
          echo "## Published Plugins" >> $GITHUB_STEP_SUMMARY
          if [ -f publish.log ]; then
            if grep -q "Successfully published" publish.log; then
              echo "✅ Publishing completed successfully" >> $GITHUB_STEP_SUMMARY
              echo "" >> $GITHUB_STEP_SUMMARY
              # Extract plugin info from the temporary repo if available
              if [ -d /tmp/tmp.*/repo ]; then
                REPO_DIR=$(find /tmp -maxdepth 1 -name "tmp.*" -type d 2>/dev/null | head -1)/repo
                if [ -f "$REPO_DIR/manifest.json" ]; then
                  cat "$REPO_DIR/manifest.json" | jq -r '.manifest.plugins[] | "- **\(.name)** v\(.latest_version)"' >> $GITHUB_STEP_SUMMARY
                fi
              fi
            else
              echo "❌ Publishing failed" >> $GITHUB_STEP_SUMMARY
              echo "" >> $GITHUB_STEP_SUMMARY
              echo "See logs for details." >> $GITHUB_STEP_SUMMARY
            fi
          fi