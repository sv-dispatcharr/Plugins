name: Publish Plugin Docs PR

# Reads the README.md generated by the Publish Plugins workflow from the
# releases branch and opens (or updates) a PR in a target repository.

on:
  workflow_run:
    workflows: ["Publish Plugins"]
    types:
      - completed
    branches:
      - main
  workflow_dispatch:

jobs:
  update-readme:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Load and validate configuration
        id: config
        env:
          GH_APP_ID: ${{ vars.GH_APP_ID }}
          GH_APP_PRIVATE_KEY: ${{ secrets.GH_APP_PRIVATE_KEY }}
          EXTERNAL_README_REPO: ${{ vars.EXTERNAL_README_REPO }}
          EXTERNAL_README_PATH: ${{ vars.EXTERNAL_README_PATH }}
        run: |
          if [[ -z "${GH_APP_ID:-}" || -z "${GH_APP_PRIVATE_KEY:-}" || -z "${EXTERNAL_README_REPO:-}" || -z "${EXTERNAL_README_PATH:-}" ]]; then
            echo "::notice::GH_APP_ID, GH_APP_PRIVATE_KEY, EXTERNAL_README_REPO, or EXTERNAL_README_PATH not configured - skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false"                       >> "$GITHUB_OUTPUT"
            echo "app_id=$GH_APP_ID"                >> "$GITHUB_OUTPUT"
            echo "target_repo=$EXTERNAL_README_REPO" >> "$GITHUB_OUTPUT"
            echo "target_path=$EXTERNAL_README_PATH" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate GitHub App token
        if: steps.config.outputs.skip != 'true'
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ steps.config.outputs.app_id }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}
          # Token is org-scoped; the app must be installed on the target repo
          owner: ${{ github.repository_owner }}

      - name: Checkout releases branch README
        if: steps.config.outputs.skip != 'true'
        uses: actions/checkout@v4
        with:
          ref: releases
          fetch-depth: 1
          clean: false
          sparse-checkout: README.md
          sparse-checkout-cone-mode: false

      - name: Extract release metadata from commit
        if: steps.config.outputs.skip != 'true'
        id: meta
        run: |
          COMMIT_MSG=$(git log -1 --format="%B" HEAD)

          # Extract source commit SHA from "Source commit: <sha>" line
          SOURCE_COMMIT=$(echo "$COMMIT_MSG" | grep -oP '(?<=Source commit: )[0-9a-f]+' || true)

          # Extract plugin list - lines starting with "- " after the source commit line
          PLUGIN_LIST=$(echo "$COMMIT_MSG" | grep -E '^\- [a-z0-9].*@' || true)

          RELEASES_COMMIT=$(git rev-parse --short HEAD)

          echo "source_commit=${SOURCE_COMMIT}" >> "$GITHUB_OUTPUT"
          echo "releases_commit=${RELEASES_COMMIT}" >> "$GITHUB_OUTPUT"

          # Write plugin list to a file to avoid quoting issues in multi-line output
          printf '%s' "$PLUGIN_LIST" > /tmp/plugin_list.txt

      - name: Strip releases-branch preamble from README
        if: steps.config.outputs.skip != 'true'
        env:
          SOURCE_REPO: ${{ github.repository }}
        run: |
          # Remove the intro paragraph and Quick Access section that are only
          # relevant on the releases branch itself, keeping everything from
          # "## Available Plugins" onward (preserving the "# Plugin Releases" title).
          CONTRIB_URL="https://github.com/${SOURCE_REPO}/blob/main/CONTRIBUTING.md"
          awk -v contrib="$CONTRIB_URL" '
            /^# Plugin Releases/ { print; print ""; print "Want to get your plugin added to this list? Check out the [plugin repository](" contrib ") to learn how to contribute."; next }
            /^## Available Plugins/ { found=1 }
            found { print }
          ' README.md > README.stripped.md
          mv README.stripped.md README.md

          # Rewrite relative links (./zips/...) to absolute GitHub URLs pointing
          # at the releases branch. Anchor links (#...) are unaffected because
          # they never start with "./".
          BASE_URL="https://github.com/${SOURCE_REPO}/tree/releases"
          sed -i "s|](\./|](${BASE_URL}/|g" README.md

      - name: Create or update PR in target repo
        if: steps.config.outputs.skip != 'true'
        env:
          TARGET_REPO: ${{ steps.config.outputs.target_repo }}
          TARGET_PATH: ${{ steps.config.outputs.target_path }}
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          SOURCE_REPO: ${{ github.repository }}
          SOURCE_COMMIT: ${{ steps.meta.outputs.source_commit }}
          RELEASES_COMMIT: ${{ steps.meta.outputs.releases_commit }}
          PR_REVIEWER: ${{ vars.PR_REVIEWER }}
        run: |
          if [[ ! -f README.md ]]; then
            echo "::error::README.md not found on the releases branch - has the Publish Plugins workflow run yet?"
            exit 1
          fi

          PLUGIN_LIST=$(cat /tmp/plugin_list.txt)

          # Build a human-readable change summary block
          build_summary() {
            echo "**Source commit:** [\`${SOURCE_COMMIT}\`](https://github.com/${SOURCE_REPO}/commit/${SOURCE_COMMIT})"
            echo "**Releases commit:** [\`${RELEASES_COMMIT}\`](https://github.com/${SOURCE_REPO}/commit/${RELEASES_COMMIT})"
            if [[ -n "$PLUGIN_LIST" ]]; then
              echo ""
              echo "**Plugins updated:**"
              while IFS= read -r line; do
                echo "$line"
              done <<< "$PLUGIN_LIST"
            fi
          }

          BRANCH="auto/dispatcharr-plugin-readme"
          DEFAULT_BRANCH=$(gh api "repos/$TARGET_REPO" --jq '.default_branch')

          # Create branch if it does not already exist
          if ! gh api "repos/$TARGET_REPO/branches/$BRANCH" > /dev/null 2>&1; then
            BASE_SHA=$(gh api "repos/$TARGET_REPO/git/refs/heads/$DEFAULT_BRANCH" \
              --jq '.object.sha')
            gh api "repos/$TARGET_REPO/git/refs" \
              -X POST \
              -f ref="refs/heads/$BRANCH" \
              -f sha="$BASE_SHA"
            echo "Created branch $BRANCH"
          fi

          # Get the existing file SHA and content from the branch
          EXISTING_RESPONSE=$(gh api "repos/$TARGET_REPO/contents/$TARGET_PATH?ref=$BRANCH" 2>/dev/null || true)
          FILE_SHA=$(echo "$EXISTING_RESPONSE" | jq -r '.sha // empty')

          # Skip if the only change is the timestamp line at the bottom of the README
          if [[ -n "$FILE_SHA" ]]; then
            EXISTING_CONTENT=$(echo "$EXISTING_RESPONSE" | jq -r '.content' | base64 -d 2>/dev/null || true)
            NEW_STRIPPED=$(grep -v '^\*Last updated:' README.md || true)
            EXISTING_STRIPPED=$(echo "$EXISTING_CONTENT" | grep -v '^\*Last updated:' || true)
            if [[ "$NEW_STRIPPED" == "$EXISTING_STRIPPED" ]]; then
              echo "README content unchanged (only timestamp differs) - skipping."
              echo "::notice::External README not updated: only the timestamp line changed."
              exit 0
            fi
          fi

          # Upload file (base64-encoded content is required by the GitHub Contents API)
          PUT_ARGS=(
            -X PUT
            -f message="chore: update plugin releases listing (source commit $SOURCE_COMMIT)"
            -f content="$(base64 -w 0 README.md)"
            -f branch="$BRANCH"
          )
          [[ -n "$FILE_SHA" ]] && PUT_ARGS+=(-f sha="$FILE_SHA")

          gh api "repos/$TARGET_REPO/contents/$TARGET_PATH" "${PUT_ARGS[@]}"

          # Re-use an existing open PR for this branch; open a new one if none exists
          EXISTING_PR=$(gh pr list \
            --repo "$TARGET_REPO" \
            --state open \
            --head "$BRANCH" \
            --json number \
            | jq -r '.[0].number // empty')

          if [[ -n "$EXISTING_PR" ]]; then
            # Add a comment to the existing PR summarising this update
            COMMENT=$(printf '### Plugin README update\n\n%s' "$(build_summary)")
            gh pr comment "$EXISTING_PR" --repo "$TARGET_REPO" --body "$COMMENT"
            echo "Added update comment to existing PR #$EXISTING_PR"
          else
            PR_BODY=$(printf 'Automated update of the plugin releases listings generated from [`%s`](https://github.com/%s).\n\n%s' \
              "$SOURCE_REPO" "$SOURCE_REPO" "$(build_summary)")
            REVIEWER_ARGS=()
            if [[ -n "${PR_REVIEWER:-}" ]]; then
              IFS=',' read -ra _reviewers <<< "$PR_REVIEWER"
              for _r in "${_reviewers[@]}"; do
                _r="${_r#@}"; _r="${_r// /}"  # strip @ and whitespace
                [[ -n "$_r" ]] && REVIEWER_ARGS+=(--reviewer "$_r")
              done
            fi
            gh pr create \
              --repo "$TARGET_REPO" \
              --head "$BRANCH" \
              --base "$DEFAULT_BRANCH" \
              --title "chore: update plugin releases listings" \
              --body "$PR_BODY" \
              "${REVIEWER_ARGS[@]}"
            echo "Created new PR"
          fi
