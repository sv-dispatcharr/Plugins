name: Update External README

# Reads the README.md generated by the Publish Plugins workflow from the
# releases branch and opens (or updates) a PR in a target repository.
#
# GitHub App setup (one-time, org-level — no personal PAT required):
#   1. Create a GitHub App in the org with:
#        Repository permissions: Contents (write), Pull requests (write)
#   2. Install the app on both this repo and the target repo.
#   3. Add to this repo's variables/secrets:
#        vars.GH_APP_ID            — the App ID (from the app's settings page)
#        secrets.GH_APP_PRIVATE_KEY — the app's private key (PEM, generated in app settings)
#
# Required repo variables:
#   EXTERNAL_README_REPO  — target repository in "org/repo" format
#   EXTERNAL_README_PATH  — file path inside that repo, e.g. "docs/plugins/README.md"

on:
  workflow_run:
    workflows: ["Publish Plugins"]
    types:
      - completed
    branches:
      - main
  workflow_dispatch:

jobs:
  update-readme:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Validate configuration
        id: config
        run: |
          if [[ -z "${{ vars.EXTERNAL_README_REPO }}" || -z "${{ vars.EXTERNAL_README_PATH }}" ]]; then
            echo "::notice::EXTERNAL_README_REPO or EXTERNAL_README_PATH repo variables are not set — skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate GitHub App token
        if: steps.config.outputs.skip != 'true'
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ vars.GH_APP_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}
          # Token is org-scoped; the app must be installed on the target repo
          owner: ${{ github.repository_owner }}

      - name: Checkout releases branch README
        if: steps.config.outputs.skip != 'true'
        uses: actions/checkout@v4
        with:
          ref: releases
          fetch-depth: 1
          sparse-checkout: README.md
          sparse-checkout-cone-mode: false

      - name: Create or update PR in target repo
        if: steps.config.outputs.skip != 'true'
        env:
          TARGET_REPO: ${{ vars.EXTERNAL_README_REPO }}
          TARGET_PATH: ${{ vars.EXTERNAL_README_PATH }}
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          SOURCE_REPO: ${{ github.repository }}
        run: |
          if [[ ! -f README.md ]]; then
            echo "::error::README.md not found on the releases branch — has the Publish Plugins workflow run yet?"
            exit 1
          fi

          BRANCH="auto/dispatcharr-plugin-readme"
          DEFAULT_BRANCH=$(gh api "repos/$TARGET_REPO" --jq '.default_branch')

          # Create branch if it does not already exist
          if ! gh api "repos/$TARGET_REPO/branches/$BRANCH" > /dev/null 2>&1; then
            BASE_SHA=$(gh api "repos/$TARGET_REPO/git/refs/heads/$DEFAULT_BRANCH" \
              --jq '.object.sha')
            gh api "repos/$TARGET_REPO/git/refs" \
              -X POST \
              -f ref="refs/heads/$BRANCH" \
              -f sha="$BASE_SHA"
            echo "Created branch $BRANCH"
          fi

          # Get the existing file SHA from the branch (required by the API to update; absent means create)
          FILE_SHA=$(gh api "repos/$TARGET_REPO/contents/$TARGET_PATH?ref=$BRANCH" \
            --jq '.sha' 2>/dev/null || true)

          # Upload file (base64-encoded content is required by the GitHub Contents API)
          PUT_ARGS=(
            -X PUT
            -f message="chore: update plugin releases README"
            -f content="$(base64 -w 0 README.md)"
            -f branch="$BRANCH"
          )
          [[ -n "$FILE_SHA" ]] && PUT_ARGS+=(-f sha="$FILE_SHA")

          gh api "repos/$TARGET_REPO/contents/$TARGET_PATH" "${PUT_ARGS[@]}"

          # Re-use an existing open PR for this branch; open a new one if none exists
          EXISTING_PR=$(gh pr list \
            --repo "$TARGET_REPO" \
            --state open \
            --head "$BRANCH" \
            --json number \
            | jq -r '.[0].number // empty')

          if [[ -n "$EXISTING_PR" ]]; then
            echo "Updated file on existing PR #$EXISTING_PR"
          else
            gh pr create \
              --repo "$TARGET_REPO" \
              --head "$BRANCH" \
              --base "$DEFAULT_BRANCH" \
              --title "chore: update plugin releases README" \
              --body "Automated update of the plugin releases README generated from [\`$SOURCE_REPO\`](https://github.com/$SOURCE_REPO)."
            echo "Created new PR"
          fi
